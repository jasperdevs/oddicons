<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Oddicons — free AI icon pack</title>
  <meta name="description" content="A free, open-source pack of AI-themed icons.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo"></div>
        <span>oddicons</span>
      </div>

      <button class="nav-item active" id="nav-home">
        <span>Home</span>
      </button>

      <div class="sep"></div>

      <div id="categories"></div>

      <div class="footnote"><span id="total"></span>free forever</div>
    </aside>

    <main class="main">
      <div class="topbar">
        <label class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search" type="search" placeholder="Search icons..." autocomplete="off">
        </label>
        <a class="icon-btn" href="https://github.com/jasperdevs/oddicons" target="_blank" rel="noopener" aria-label="GitHub">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .297a12 12 0 0 0-3.792 23.39c.6.113.82-.26.82-.577v-2.04c-3.338.725-4.042-1.61-4.042-1.61-.546-1.385-1.333-1.755-1.333-1.755-1.09-.744.083-.729.083-.729 1.205.084 1.84 1.237 1.84 1.237 1.07 1.835 2.809 1.305 3.495.998.108-.776.42-1.306.76-1.606-2.665-.305-5.467-1.333-5.467-5.932 0-1.311.468-2.382 1.236-3.222-.124-.303-.535-1.525.117-3.176 0 0 1.008-.322 3.3 1.23a11.47 11.47 0 0 1 6.003 0c2.29-1.552 3.296-1.23 3.296-1.23.655 1.65.243 2.873.12 3.176.77.84 1.236 1.91 1.236 3.222 0 4.61-2.807 5.624-5.48 5.922.432.372.816 1.102.816 2.222v3.293c0 .319.216.694.825.576A12.001 12.001 0 0 0 12 .297"/></svg>
        </a>
      </div>

      <div class="content">
        <div class="count-row" id="count"></div>
        <div class="grid" id="grid"></div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
